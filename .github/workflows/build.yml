name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware/src/**'
      - 'firmware/platformio.ini'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/src/**'
      - 'firmware/platformio.ini'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  FIRMWARE_DIR: firmware

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.FIRMWARE_DIR }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Build firmware
        run: pio run

      - name: Upload firmware binary
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32
          path: ${{ env.FIRMWARE_DIR }}/.pio/build/esp32dev/firmware.bin

      - name: Generate release info
        if: github.ref == 'refs/heads/main'
        id: info
        run: |
          echo "version=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        working-directory: .

      - name: Create GitHub Release (on main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: Firmware ${{ steps.info.outputs.version }} (${{ steps.info.outputs.sha }})
          body: |
            ## KEI Robot Firmware Build

            - Commit: `${{ steps.info.outputs.sha }}`
            - Build date: ${{ steps.info.outputs.version }}

            ### Flash Instructions

            ```bash
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash -z 0x1000 firmware/.pio/build/esp32dev/firmware.bin
            ```
          files: |
            firmware/.pio/build/esp32dev/firmware.bin
